<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JCMX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="ui">
    <h1>JCMX</h1>
    <div id="mode-select">
      <button data-mode="trials">Trials Mode</button>
      <button data-mode="motocross">Motocross Mode</button>
    </div>
    <div id="bike-select">
      <button data-bike="green-2">Green 2‑Stroke</button>
      <button data-bike="red-4">Red 4‑Stroke</button>
      <button data-bike="blue-2">Blue 2‑Stroke</button>
    </div>
    <div id="level-select"></div>
  </div>

  <canvas id="game" width="960" height="540"></canvas>

  <script src="game.js"></script>
</body>
</html>
