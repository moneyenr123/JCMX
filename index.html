<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JCMX – Dirt Bike</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    :root {
      --bg: #05060a;
      --fg: #f5f5f7;
      --ui: #10131f;
      --accent: #00ff88;
      --danger: #ff4b5c;
      --track: #2a303b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #171b2b 0, #05060a 55%, #000 100%);
      color: var(--fg);
      overflow: hidden;
      touch-action: none;
    }

    #gameContainer {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    header {
      width: 100%;
      text-align: center;
      padding: 4px 0;
      background: linear-gradient(to right, rgba(0,0,0,0.7), rgba(0,0,0,0.4), rgba(0,0,0,0.7));
      z-index: 5;
    }

    h1 {
      letter-spacing: 0.16em;
      font-weight: 800;
      font-size: 1.1rem;
      text-transform: uppercase;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.7rem;
      opacity: 0.8;
    }

    #gameCanvas {
      flex: 1;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to top, #05060a 0, #101320 40%, #1a2340 100%);
      display: block;
    }

    .hud {
      position: fixed;
      left: 8px;
      top: 40px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.7rem;
      z-index: 10;
    }

    .pill {
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(6px);
    }

    .pill.accent {
      border-color: rgba(0, 255, 136, 0.7);
      color: var(--accent);
    }

    .pill.danger {
      border-color: rgba(255, 75, 92, 0.7);
      color: var(--danger);
    }

    .controls {
      position: fixed;
      bottom: 10px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 10px;
      z-index: 20;
      pointer-events: none;
    }

    .control-group {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.15), rgba(0,0,0,0.9));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      box-shadow: 0 6px 16px rgba(0,0,0,0.7);
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    .btn.small {
      width: 44px;
      height: 44px;
      font-size: 0.7rem;
    }

    .btn:active {
      transform: scale(0.95);
      box-shadow: 0 3px 10px rgba(0,0,0,0.8);
    }

    @media (min-width: 900px) {
      header {
        padding: 6px 0;
      }
      h1 {
        font-size: 1.3rem;
      }
      .subtitle {
        font-size: 0.8rem;
      }
      .hud {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <header>
      <h1><span>JC</span>MX</h1>
      <div class="subtitle">Realistic dirt‑bike physics • 50 levels • 2‑stroke engine</div>
    </header>
    <canvas id="gameCanvas"></canvas>

    <div class="hud">
      <div class="pill accent" id="bikeLabel">Bike: xk</div>
      <div class="pill" id="levelLabel">Level: 1 / 50</div>
      <div class="pill" id="timeLabel">Time: 0.0s</div>
      <div class="pill" id="speedLabel">Speed: 0</div>
    </div>

    <div class="controls">
      <div class="control-group">
        <div class="btn" id="btnLeft">⟵</div>
        <div class="btn" id="btnRight">⟶</div>
      </div>
      <div class="control-group">
        <div class="btn" id="btnBrake">⛔</div>
        <div class="btn" id="btnGas">▲</div>
      </div>
      <div class="control-group">
        <div class="btn small" id="btnRestart">R</div>
        <div class="btn small" id="btnNext">N</div>
      </div>
    </div>
  </div>

  <audio id="engineSound" src="two_stroke.mp3" loop preload="auto"></audio>

  <script>
    // ===== Canvas / resize =====
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    let W = () => canvas.getBoundingClientRect().width;
    let H = () => canvas.getBoundingClientRect().height;

    // ===== Audio =====
    const engineSound = document.getElementById("engineSound");
    engineSound.volume = 0.35;

    // ===== Bikes =====
    const bikes = [
      { id: "xk",  color: "#00ff66", weight: 1.0, power: 1.05, grip: 1.0, airControl: 1.0 },
      { id: "zy",  color: "#4da3ff", weight: 0.98, power: 1.0,  grip: 1.05, airControl: 1.1 },
      { id: "rc",  color: "#ff3b4f", weight: 1.05, power: 1.1,  grip: 0.95, airControl: 0.95 },
      { id: "cfr", color: "#ff3b4f", weight: 1.02, power: 1.15, grip: 1.05, airControl: 1.1 }
    ];
    let currentBikeIndex = 0;

    // ===== Input (keyboard + touch) =====
    const keys = {
      left: false,
      right: false,
      up: false,
      brake: false
    };

    window.addEventListener("keydown", (e) => {
      switch (e.key) {
        case "ArrowLeft": keys.left = true; break;
        case "ArrowRight": keys.right = true; break;
        case "ArrowUp": keys.up = true; break;
        case " ": keys.brake = true; e.preventDefault(); break;
        case "1": case "2": case "3": case "4":
          currentBikeIndex = parseInt(e.key, 10) - 1;
          resetLevel();
          break;
        case "r":
        case "R":
          resetLevel();
          break;
        case "n":
        case "N":
          nextLevel();
          break;
      }
    });

    window.addEventListener("keyup", (e) => {
      switch (e.key) {
        case "ArrowLeft": keys.left = false; break;
        case "ArrowRight": keys.right = false; break;
        case "ArrowUp": keys.up = false; break;
        case " ": keys.brake = false; break;
      }
    });

    function bindButton(id, keyName) {
      const el = document.getElementById(id);
      const set = (v) => { keys[keyName] = v; };
      const start = (ev) => { ev.preventDefault(); set(true); };
      const end = (ev) => { ev.preventDefault(); set(false); };
      ["pointerdown", "touchstart"].forEach(ev => el.addEventListener(ev, start));
      ["pointerup", "pointerleave", "touchend", "touchcancel"].forEach(ev => el.addEventListener(ev, end));
    }

    bindButton("btnLeft", "left");
    bindButton("btnRight", "right");
    bindButton("btnGas", "up");
    bindButton("btnBrake", "brake");

    document.getElementById("btnRestart").addEventListener("pointerdown", (e) => { e.preventDefault(); resetLevel(); });
    document.getElementById("btnNext").addEventListener("pointerdown", (e) => { e.preventDefault(); nextLevel(); });

    // ===== Levels / terrain =====
    const levels = [];
    for (let i = 1; i <= 50; i++) {
      levels.push({
        id: i,
        length: 2600 + i * 90,
        gapChance: 0.02 + i * 0.0015,
        spikeChance: 0.015 + i * 0.002,
        slopeIntensity: 0.7 + i * 0.015,
        checkpointEvery: 650 - i * 4,
        gravity: 0.55 + i * 0.004,
        maxSpeed: 16 + i * 0.15
      });
    }

    let currentLevelIndex = 0;
    let trackPoints = [];
    let obstacles = [];

    function generateLevel(levelConfig) {
      trackPoints = [];
      obstacles = [];

      const step = 18;
      const length = levelConfig.length;
      let x = 0;
      let baseY = H() * 0.7;
      let phase = 0;

      while (x <= length) {
        const bigRoll = Math.sin(phase * 0.35) * 60;
        const medium = Math.sin(phase * 0.9) * 25;
        const small = Math.sin(phase * 2.1) * 10;
        let y = baseY + (bigRoll + medium + small) * levelConfig.slopeIntensity;

        // Gentle random noise
        y += (Math.random() - 0.5) * 6;

        // Occasional gap
        if (Math.random() < levelConfig.gapChance && x > 250 && x < length - 350) {
          y = H() + 200;
          obstacles.push({
            type: "gap",
            xStart: x - step,
            xEnd: x + step
          });
        }

        trackPoints.push({ x, y });
        x += step;
        phase += 0.18;
      }

      // Spikes
      for (let i = 5; i < trackPoints.length - 5; i++) {
        if (Math.random() < levelConfig.spikeChance) {
          const p = trackPoints[i];
          if (p.y < H()) {
            obstacles.push({
              type: "spike",
              x: p.x,
              y: p.y - 12,
              width: 20,
              height: 20
            });
          }
        }
      }

      // Checkpoints
      const cpStep = Math.max(450, levelConfig.checkpointEvery);
      for (let cx = cpStep; cx < length - 250; cx += cpStep) {
        const y = getTrackYRaw(cx);
        obstacles.push({
          type: "checkpoint",
          x: cx,
          y: y - 30,
          radius: 14
        });
      }

      // Finish
      const finishX = length - 160;
      const finishY = getTrackYRaw(finishX);
      obstacles.push({
        type: "finish",
        x: finishX,
        y: finishY - 60,
        width: 24,
        height: 100
      });
    }

    function getTrackYRaw(worldX) {
      if (trackPoints.length === 0) return H() * 0.7;
      if (worldX <= 0) return trackPoints[0].y;
      if (worldX >= trackPoints[trackPoints.length - 1].x) {
        return trackPoints[trackPoints.length - 1].y;
      }
      const step = trackPoints[1].x - trackPoints[0].x;
      const i = Math.floor(worldX / step);
      const p0 = trackPoints[i];
      const p1 = trackPoints[i + 1];
      const t = (worldX - p0.x) / (p1.x - p0.x);
      return p0.y * (1 - t) + p1.y * t;
    }

    function getTrackNormal(worldX) {
      const step = trackPoints[1].x - trackPoints[0].x;
      const x0 = Math.max(0, worldX - step);
      const x1 = Math.min(trackPoints[trackPoints.length - 1].x, worldX + step);
      const y0 = getTrackYRaw(x0);
      const y1 = getTrackYRaw(x1);
      const dx = x1 - x0;
      const dy = y1 - y0;
      const len = Math.hypot(dx, dy) || 1;
      return { nx: -dy / len, ny: dx / len };
    }

    // ===== Procedural Dirt Texture =====
    let dirtPattern = null;

    function generateDirtTexture() {
      const size = 120;
      const tex = document.createElement("canvas");
      tex.width = size;
      tex.height = size;
      const tctx = tex.getContext("2d");

      // Base dirt color
      tctx.fillStyle = "#3b2f23";
      tctx.fillRect(0, 0, size, size);

      // Dark grain
      for (let i = 0; i < 350; i++) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const alpha = 0.15 + Math.random() * 0.25;
        tctx.fillStyle = `rgba(0,0,0,${alpha})`;
        tctx.fillRect(x, y, 2, 2);
      }

      // Light speckles
      for (let i = 0; i < 250; i++) {
        const x = Math.random() * size;
        const y = Math.random() * size;
        const alpha = 0.1 + Math.random() * 0.2;
        tctx.fillStyle = `rgba(255,255,255,${alpha})`;
        tctx.fillRect(x, y, 1.5, 1.5);
      }

      dirtPattern = ctx.createPattern(tex, "repeat");
    }

    generateDirtTexture();

    // ===== Bike physics =====
    const bike = {
      x: 100,
      y: 0,
      vx: 0,
      vy: 0,
      angle: 0,
      angVel: 0,
      onGround: false,
      dead: false,
      finished: false,
      lastCheckpointX: 100,
      lastCheckpointY: 0
    };

    const camera = { x: 0 };

    let levelTime = 0;
    let lastTimestamp = performance.now();

    const bikeLabel = document.getElementById("bikeLabel");
    const levelLabel = document.getElementById("levelLabel");
    const timeLabel = document.getElementById("timeLabel");
    const speedLabel = document.getElementById("speedLabel");

    function resetBike() {
      const startY = getTrackYRaw(100);
      bike.x = 100;
      bike.y = startY - 22;
      bike.vx = 0;
      bike.vy = 0;
      bike.angle = 0;
      bike.angVel = 0;
      bike.onGround = true;
      bike.dead = false;
      bike.finished = false;
      bike.lastCheckpointX = bike.x;
      bike.lastCheckpointY = bike.y;
      camera.x = 0;
      levelTime = 0;
    }

    function resetLevel() {
      const levelConfig = levels[currentLevelIndex];
      generateLevel(levelConfig);
      resetBike();
    }

    function nextLevel() {
      currentLevelIndex = (currentLevelIndex + 1) % levels.length;
      resetLevel();
    }

    function killRider() {
      if (bike.dead || bike.finished) return;
      bike.dead = true;
      engineSound.pause();
      engineSound.currentTime = 0;
      setTimeout(resetLevel, 900);
    }

    function finishLevel() {
      if (bike.dead || bike.finished) return;
      bike.finished = true;
      engineSound.pause();
      engineSound.currentTime = 0;
      setTimeout(nextLevel, 1200);
    }

    resetLevel();

    function update(dt) {
      const levelConfig = levels[currentLevelIndex];
      const bikeType = bikes[currentBikeIndex];

      if (!bike.dead && !bike.finished) {
        levelTime += dt / 1000;
      }

      // Engine sound
      const targetRate = 0.7 + (keys.up ? 0.6 : 0) + Math.min(Math.abs(bike.vx) / levelConfig.maxSpeed, 1) * 0.6;
      engineSound.playbackRate = targetRate;

      if ((keys.up || Math.abs(bike.vx) > 0.5) && !bike.dead && !bike.finished) {
        if (engineSound.paused) {
          engineSound.play().catch(() => {});
        }
      } else {
        engineSound.pause();
      }

      if (bike.dead || bike.finished) {
        bike.vx *= 0.98;
        bike.vy += levelConfig.gravity * bikeType.weight;
        bike.x += bike.vx;
        bike.y += bike.vy;
        bike.angle += bike.angVel;
        bike.angVel *= 0.99;
        return;
      }

      // Engine / brake
      if (keys.up) {
        const engineForce = 0.42 * bikeType.power;
        bike.vx += engineForce;
      }

      if (keys.brake) {
        const brakeForce = 0.55 * bikeType.grip;
        if (bike.vx > 0) {
          bike.vx -= brakeForce;
          if (bike.vx < 0) bike.vx = 0;
        }
      }

      // Cap speed
      const maxSpeed = levelConfig.maxSpeed * bikeType.power;
      if (bike.vx > maxSpeed) bike.vx = maxSpeed;

      // Air control
      if (!bike.onGround) {
        const airTorque = 0.0032 * bikeType.airControl * dt;
        if (keys.left) bike.angVel -= airTorque;
        if (keys.right) bike.angVel += airTorque;
      } else {
        if (keys.left) bike.vx -= 0.02 * bikeType.grip;
        if (keys.right) bike.vx += 0.02 * bikeType.grip;
      }

      // Gravity
      bike.vy += levelConfig.gravity * bikeType.weight;

      // Integrate
      bike.x += bike.vx;
      bike.y += bike.vy;
      bike.angle += bike.angVel;

      // Damping
      bike.vx *= 0.99;
      bike.angVel *= 0.985;

      // Ground collision
      const groundY = getTrackYRaw(bike.x);
      if (bike.y >= groundY - 20) {
        const impactSpeed = bike.vy;
        const { nx, ny } = getTrackNormal(bike.x);
        const groundAngle = Math.atan2(ny, nx) - Math.PI / 2;
        const angleDiff = Math.abs(((bike.angle - groundAngle + Math.PI) % (Math.PI * 2)) - Math.PI);

        if (impactSpeed > 9 && angleDiff > 0.75) {
          killRider();
          return;
        }

        bike.vy = 0;
        bike.y = groundY - 20;
        bike.onGround = true;

        bike.angle += (groundAngle - bike.angle) * 0.25;
        bike.angVel *= 0.4;
      } else {
        bike.onGround = false;
      }

      // Upside‑down in air
      if (!bike.onGround && Math.abs(((bike.angle + Math.PI) % (Math.PI * 2)) - Math.PI) > 1.9) {
        killRider();
      }

      // Obstacles
      for (const o of obstacles) {
        if (o.type === "spike") {
          const dx = bike.x - o.x;
          const dy = bike.y - (o.y - 5);
          if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
            killRider();
            break;
          }
        } else if (o.type === "finish") {
          if (bike.x > o.x - 10 && bike.x < o.x + o.width + 10 && bike.y > o.y - 60) {
            finishLevel();
            break;
          }
        } else if (o.type === "checkpoint") {
          const dx = bike.x - o.x;
          const dy = bike.y - o.y;
          const dist = Math.hypot(dx, dy);
          if (dist < o.radius + 18) {
            bike.lastCheckpointX = o.x;
            bike.lastCheckpointY = getTrackYRaw(o.x) - 20;
          }
        }
      }

      // Fall off world
      if (bike.y > H() + 250) {
        bike.x = bike.lastCheckpointX;
        bike.y = bike.lastCheckpointY;
        bike.vx = 0;
        bike.vy = 0;
        bike.angle = 0;
        bike.angVel = 0;
      }

      // Camera follow
      const targetCamX = bike.x - W() * 0.45;
      camera.x += (targetCamX - camera.x) * 0.12;
      camera.x = Math.max(0, Math.min(camera.x, levels[currentLevelIndex].length - W()));

      // HUD
      bikeLabel.textContent = "Bike: " + bikeType.id;
      levelLabel.textContent = "Level: " + (currentLevelIndex + 1) + " / " + levels.length;
      timeLabel.textContent = "Time: " + levelTime.toFixed(1) + "s";
      speedLabel.textContent = "Speed: " + Math.abs(bike.vx).toFixed(1);
    }

    // ===== Drawing =====
    function drawBackground() {
      const h = H();
      const w = W();
      const horizon = h * 0.45;

      // Far hills
      ctx.fillStyle = "#0b1020";
      ctx.beginPath();
      ctx.moveTo(0, h);
      for (let x = 0; x <= w; x += 12) {
        const worldX = x + camera.x * 0.25;
        const y =
          horizon +
          Math.sin(worldX * 0.0015) * 30 +
          Math.cos(worldX * 0.0007) * 20;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h);
      ctx.closePath();
      ctx.fill();

      // Mid hills
      ctx.fillStyle = "#11182b";
      ctx.beginPath();
      ctx.moveTo(0, h);
      for (let x = 0; x <= w; x += 12) {
        const worldX = x + camera.x * 0.5;
        const y =
          horizon +
          40 +
          Math.sin(worldX * 0.002) * 35 +
          Math.cos(worldX * 0.001) * 25;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h);
      ctx.closePath();
      ctx.fill();
    }

    function drawTrack() {
      if (trackPoints.length === 0) return;
      const h = H();

      // Textured dirt under track
      ctx.fillStyle = dirtPattern;
      ctx.beginPath();
      ctx.moveTo(trackPoints[0].x - camera.x, h);
      for (let i = 0; i < trackPoints.length; i++) {
        const sx = trackPoints[i].x - camera.x;
        const sy = trackPoints[i].y;
        ctx.lineTo(sx, sy);
      }
      ctx.lineTo(trackPoints[trackPoints.length - 1].x - camera.x, h);
      ctx.closePath();
      ctx.fill();

      // Dark outline
      ctx.lineWidth = 4;
      ctx.strokeStyle = "#1e1e1e";
      ctx.beginPath();
      for (let i = 0; i < trackPoints.length; i++) {
        const sx = trackPoints[i].x - camera.x;
        const sy = trackPoints[i].y;
        if (i === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      }
      ctx.stroke();

      // Highlight ridge
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,255,255,0.15)";
      ctx.beginPath();
      for (let i = 0; i < trackPoints.length; i++) {
        const sx = trackPoints[i].x - camera.x;
        const sy = trackPoints[i].y - 2;
        if (i === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
      }
      ctx.stroke();
    }

    function drawObstacles() {
      for (const o of obstacles) {
        const sx = o.x - camera.x;
        if (o.type === "spike") {
          ctx.fillStyle = "#ff4b5c";
          ctx.beginPath();
          ctx.moveTo(sx - o.width / 2, o.y + o.height / 2);
          ctx.lineTo(sx, o.y - o.height / 2);
          ctx.lineTo(sx + o.width / 2, o.y + o.height / 2);
          ctx.closePath();
          ctx.fill();
        } else if (o.type === "finish") {
          ctx.save();
          ctx.translate(sx, o.y);
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, o.width, o.height);
          ctx.fillStyle = "#000000";
          const cell = 8;
          for (let y = 0; y < o.height; y += cell) {
            for (let x = 0; x < o.width; x += cell) {
              if (((x + y) / cell) % 2 === 0) {
                ctx.fillRect(x, y, cell, cell);
              }
            }
          }
          ctx.restore();
        } else if (o.type === "checkpoint") {
          ctx.save();
          ctx.translate(sx, o.y);
          ctx.strokeStyle = "#00ff88";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, o.radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, -o.radius);
          ctx.lineTo(0, o.radius);
          ctx.stroke();
          ctx.restore();
        }
      }
    }

    function drawBike() {
      const bikeType = bikes[currentBikeIndex];
      const sx = bike.x - camera.x;
      const sy = bike.y;

      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(bike.angle);

      // Shadow
      ctx.save();
      ctx.translate(0, 22);
      ctx.scale(1.5, 0.45);
      ctx.fillStyle = "rgba(0,0,0,0.45)";
      ctx.beginPath();
      ctx.ellipse(0, 0, 26, 11, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Wheels
      function drawWheel(x, y) {
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#000000";
        ctx.fillStyle = "#222833";
        ctx.beginPath();
        ctx.arc(x, y, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = "#555f73";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x - 10, y);
        ctx.lineTo(x + 10, y);
        ctx.moveTo(x, y - 10);
        ctx.lineTo(x, y + 10);
        ctx.stroke();
      }

      drawWheel(-22, 10);
      drawWheel(22, 10);

      // Frame (realistic MX‑style silhouette, generic)
      ctx.lineWidth = 3;
      ctx.strokeStyle = bikeType.color;
      ctx.beginPath();
      ctx.moveTo(-22, 4);
      ctx.lineTo(-8, -4);
      ctx.lineTo(4, -6);
      ctx.lineTo(18, -2);
      ctx.lineTo(24, 4);
      ctx.lineTo(10, 8);
      ctx.lineTo(-10, 8);
      ctx.closePath();
      ctx.stroke();

      // Tank / shrouds
      ctx.fillStyle = bikeType.color;
      ctx.beginPath();
      ctx.moveTo(-6, -10);
      ctx.lineTo(10, -10);
      ctx.lineTo(14, -4);
      ctx.lineTo(2, -2);
      ctx.lineTo(-8, -4);
      ctx.closePath();
      ctx.fill();

      // Seat
      ctx.fillStyle = "#111111";
      ctx.beginPath();
      ctx.moveTo(-4, -12);
      ctx.lineTo(12, -12);
      ctx.lineTo(8, -8);
      ctx.lineTo(-6, -8);
      ctx.closePath();
      ctx.fill();

      // Forks
      ctx.strokeStyle = "#d0d4e0";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(10, -6);
      ctx.lineTo(22, 6);
      ctx.stroke();

      // Bars
      ctx.beginPath();
      ctx.moveTo(-2, -16);
      ctx.lineTo(8, -18);
      ctx.stroke();

      // Rider
      ctx.strokeStyle = "#f5f5f7";
      ctx.lineWidth = 2;
      // torso
      ctx.beginPath();
      ctx.moveTo(-2, -14);
      ctx.lineTo(-2, -26);
      ctx.stroke();
      // head
      ctx.beginPath();
      ctx.arc(-2, -30, 4, 0, Math.PI * 2);
      ctx.fillStyle = "#f5f5f7";
      ctx.fill();
      // arms
      ctx.beginPath();
      ctx.moveTo(-2, -20);
      ctx.lineTo(6, -16);
      ctx.stroke();
      // legs
      ctx.beginPath();
      ctx.moveTo(-2, -14);
      ctx.lineTo(-10, 6);
      ctx.stroke();

      ctx.restore();
    }

    // ===== Loop =====
    function loop(timestamp) {
      const dt = timestamp - lastTimestamp;
      lastTimestamp = timestamp;

      update(dt);

      ctx.clearRect(0, 0, W(), H());
      drawBackground();
      drawTrack();
      drawObstacles();
      drawBike();

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
