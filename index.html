<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JCMX 3D</title>
    
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="apple-touch-icon" href="../favicon.png">
    <meta name="apple-mobile-web-app-title" content="JCMX">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00ff88;
            font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,255,136,0.5); pointer-events: none;
        }

        .controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 40px;
            box-sizing: border-box; pointer-events: none;
        }

        .btn-group { display: flex; gap: 20px; pointer-events: auto; }
        .touch-btn {
            width: 70px; height: 70px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            color: white; font-size: 24px; display: flex; align-items: center; 
            justify-content: center; user-select: none; backdrop-filter: blur(5px);
        }
        .touch-btn:active { background: rgba(0, 255, 136, 0.4); }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 24px;">JCMX <span style="color:white">3D</span></div>
        <div id="speed" style="font-size: 14px; margin-top: 5px;">0 MPH</div>
    </div>

    <div class="controls">
        <div class="btn-group">
            <div class="touch-btn" id="btn-left">←</div>
            <div class="touch-btn" id="btn-right">→</div>
        </div>
        <div class="btn-group">
            <div class="touch-btn" id="btn-brake" style="border-color: #ff4b5c;">B</div>
            <div class="touch-btn" id="btn-gas" style="border-color: #00ff88;">GO</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- GAME CONFIG ---
        let scene, camera, renderer, terrain, bike;
        let speed = 0;
        let rotation = 0;
        let input = { forward: false, backward: false, left: false, right: false };
        const clock = new THREE.Clock();

        init();
        animate();

        function init() {
            // Scene & Sky
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 50, 150);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(50, 100, 50);
            sun.castShadow = true;
            scene.add(sun);

            // Terrain Generation
            createTerrain();

            // Bike Construction
            createBike();

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            setupControls();
        }

        function createTerrain() {
            const size = 1000;
            const segments = 128;
            const geometry = new THREE.PlaneGeometry(size, size, segments, segments);
            
            // Randomize height for a "dirt track" feel
            const vertices = geometry.attributes.position.array;
            for (let i = 0; i < vertices.length; i += 3) {
                const x = vertices[i];
                const y = vertices[i+1];
                // Simple sine-based noise for hills
                vertices[i + 2] = Math.sin(x * 0.05) * Math.cos(y * 0.05) * 4 + 
                                  Math.sin(x * 0.02) * 6;
            }
            geometry.computeVertexNormals();

            const material = new THREE.MeshPhongMaterial({ 
                color: 0x5c4033, 
                flatShading: true,
                shininess: 0
            });
            
            terrain = new THREE.Mesh(geometry, material);
            terrain.rotation.x = -Math.PI / 2;
            terrain.receiveShadow = true;
            scene.add(terrain);

            // Add some "track" markers (little rocks/bumps)
            for(let i=0; i<100; i++) {
                const rockGeom = new THREE.DodecahedronGeometry(Math.random() * 2);
                const rockMat = new THREE.MeshPhongMaterial({color: 0x444444});
                const rock = new THREE.Mesh(rockGeom, rockMat);
                rock.position.set(Math.random()*400-200, 0, Math.random()*400-200);
                rock.position.y = getTerrainHeight(rock.position.x, rock.position.z);
                scene.add(rock);
            }
        }

        function createBike() {
            bike = new THREE.Group();

            // Wheels (Knobby Tires)
            const wheelGeom = new THREE.CylinderGeometry(1.2, 1.2, 0.6, 12);
            wheelGeom.rotateZ(Math.PI/2);
            const wheelMat = new THREE.MeshPhongMaterial({color: 0x111111});
            
            const rearWheel = new THREE.Mesh(wheelGeom, wheelMat);
            rearWheel.position.set(0, 1.2, -2);
            rearWheel.castShadow = true;
            bike.add(rearWheel);

            const frontWheel = new THREE.Mesh(wheelGeom, wheelMat);
            frontWheel.position.set(0, 1.2, 2);
            frontWheel.castShadow = true;
            bike.add(frontWheel);

            // Main Frame
            const frameMat = new THREE.MeshPhongMaterial({color: 0x00ff88}); // Iconic Green
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1, 3), frameMat);
            body.position.y = 2.2;
            body.castShadow = true;
            bike.add(body);

            // Handlebars
            const bars = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 2.5), new THREE.MeshPhongMaterial({color: 0x333333}));
            bars.rotation.z = Math.PI/2;
            bars.position.set(0, 3.2, 1.5);
            bike.add(bars);

            // Exhaust Pipe
            const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1.5), new THREE.MeshPhongMaterial({color: 0x888888}));
            pipe.rotation.x = Math.PI/2;
            pipe.position.set(0.5, 2, -1.5);
            bike.add(pipe);

            bike.position.set(0, 5, 0);
            scene.add(bike);
        }

        function getTerrainHeight(x, z) {
            // This is a simplified Raycaster height check
            const raycaster = new THREE.Raycaster(new THREE.Vector3(x, 100, z), new THREE.Vector3(0, -1, 0));
            const intersects = raycaster.intersectObject(terrain);
            if (intersects.length > 0) return intersects[0].point.y;
            return 0;
        }

        function setupControls() {
            const handleKey = (e, val) => {
                if (e.key === 'ArrowUp' || e.key === 'w') input.forward = val;
                if (e.key === 'ArrowDown' || e.key === 's') input.backward = val;
                if (e.key === 'ArrowLeft' || e.key === 'a') input.left = val;
                if (e.key === 'ArrowRight' || e.key === 'd') input.right = val;
            };
            window.addEventListener('keydown', (e) => handleKey(e, true));
            window.addEventListener('keyup', (e) => handleKey(e, false));

            // Touch Buttons
            const bind = (id, prop) => {
                const el = document.getElementById(id);
                el.onpointerdown = () => input[prop] = true;
                el.onpointerup = () => input[prop] = false;
                el.ontouchstart = (e) => { e.preventDefault(); input[prop] = true; };
                el.ontouchend = () => input[prop] = false;
            };
            bind('btn-gas', 'forward');
            bind('btn-brake', 'backward');
            bind('btn-left', 'left');
            bind('btn-right', 'right');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Movement Physics
            if (input.forward) speed += 20 * delta;
            if (input.backward) speed -= 30 * delta;
            speed *= 0.98; // Friction

            if (input.left) rotation += 2 * delta;
            if (input.right) rotation -= 2 * delta;

            // Update Bike Position
            bike.rotation.y = rotation;
            bike.position.x += Math.sin(rotation) * speed * delta;
            bike.position.z += Math.cos(rotation) * speed * delta;

            // Ground stickiness
            const groundY = getTerrainHeight(bike.position.x, bike.position.z);
            bike.position.y = THREE.MathUtils.lerp(bike.position.y, groundY, 0.1);

            // Tilt bike based on speed/turn
            bike.rotation.z = THREE.MathUtils.lerp(bike.rotation.z, (input.left ? 0.3 : input.right ? -0.3 : 0), 0.1);
            bike.rotation.x = THREE.MathUtils.lerp(bike.rotation.x, speed * -0.01, 0.1);

            // Camera follow (Third Person)
            const camOffset = new THREE.Vector3(
                -Math.sin(rotation) * 12,
                6,
                -Math.cos(rotation) * 12
            );
            camera.position.lerp(bike.position.clone().add(camOffset), 0.1);
            camera.lookAt(bike.position.x, bike.position.y + 2, bike.position.z);

            // UI Update
            document.getElementById('speed').innerText = Math.abs(Math.round(speed)) + " MPH";

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
