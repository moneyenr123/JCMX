<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JCMX | Pro-Circuit Simulator</title>
    
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="apple-touch-icon" href="../favicon.png">
    <meta name="apple-mobile-web-app-title" content="JC Mini Games">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <style>
        :root {
            --kx-green: #39ff14;
            --honda-red: #ff1100;
            --yamaha-blue: #0055ff;
            --panel-bg: rgba(10, 10, 12, 0.95);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            color: #fff; font-family: 'Arial Black', sans-serif;
        }

        canvas { display: block; width: 100vw; height: 100vh; }

        /* --- PRO MENU --- */
        #ui-wrapper {
            position: fixed; inset: 0; z-index: 100;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .logo-area { text-align: center; margin-bottom: 50px; }
        .logo-text {
            font-size: 9rem; font-style: italic; font-weight: 900;
            background: linear-gradient(180deg, #fff 0%, #444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0; line-height: 0.8; letter-spacing: -8px;
        }
        .tagline { letter-spacing: 10px; color: #666; font-size: 1rem; margin-top: 15px; }

        .garage-selector {
            display: flex; gap: 20px; width: 90%; max-width: 1000px;
        }

        .bike-option {
            flex: 1; background: #111; border: 2px solid #222; border-radius: 15px;
            padding: 30px; cursor: pointer; transition: 0.3s; text-align: center;
        }
        .bike-option:hover { border-color: #555; transform: scale(1.02); }
        .bike-option.active { border-color: var(--active-color); box-shadow: 0 0 30px var(--active-color); }

        .bike-option h2 { margin: 0; font-size: 2rem; }
        .bike-option p { font-size: 0.8rem; color: #555; text-transform: uppercase; margin-top: 10px; }

        .ride-btn {
            margin-top: 50px; padding: 25px 100px; font-size: 2.5rem;
            background: #fff; color: #000; border: none; border-radius: 60px;
            font-weight: 900; cursor: pointer; transition: 0.2s;
        }
        .ride-btn:hover { background: var(--kx-green); transform: scale(1.05); }

        /* --- HUD --- */
        #hud {
            position: absolute; inset: 0; pointer-events: none;
            display: none; z-index: 50;
        }
        .speed-box {
            position: absolute; bottom: 50px; right: 60px; text-align: right;
        }
        .speed-val { font-size: 7rem; font-weight: 900; line-height: 0.8; color: #fff; }
        .speed-unit { font-size: 1.5rem; color: #444; }

        .tach {
            position: absolute; bottom: 50px; left: 60px; width: 350px;
        }
        .tach-bar { height: 12px; background: #222; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .tach-fill { height: 100%; width: 0%; background: #fff; transition: width 0.05s; }
    </style>
</head>
<body>

    <div id="ui-wrapper">
        <div class="logo-area">
            <h1 class="logo-text">JCMX</h1>
            <div class="tagline">PRO CIRCUIT SERIES</div>
        </div>

        <div class="garage-selector">
            <div class="bike-option active" style="--active-color: var(--kx-green)" onclick="selectBike(0, this)">
                <h2 style="color: var(--kx-green)">KX 85</h2>
                <p>2-Stroke Factory Green</p>
            </div>
            <div class="bike-option" style="--active-color: var(--honda-red)" onclick="selectBike(1, this)">
                <h2 style="color: var(--honda-red)">CRF 450</h2>
                <p>4-Stroke Open Class</p>
            </div>
            <div class="bike-option" style="--active-color: var(--yamaha-blue)" onclick="selectBike(2, this)">
                <h2 style="color: var(--yamaha-blue)">YZ 250</h2>
                <p>Classic 2-Stroke Power</p>
            </div>
        </div>

        <button class="ride-btn" onclick="startEngine()">IGNITION</button>
    </div>

    <div id="hud">
        <div class="speed-box">
            <div class="speed-val" id="hud-speed">0</div>
            <div class="speed-unit">MPH</div>
        </div>
        <div class="tach">
            <div style="font-size: 0.9rem; color: #666;">ENGINE RPM / POWERBAND</div>
            <div class="tach-bar"><div class="tach-fill" id="hud-rpm"></div></div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CONSTANTS & CONFIG ---
        const BIKE_SPECS = [
            { name: "KX 85", color: 0x39ff14, accel: 1.8, topSpeed: 65 },
            { name: "CRF 450", color: 0xff1100, accel: 2.2, topSpeed: 90 },
            { name: "YZ 250", color: 0x0055ff, accel: 2.0, topSpeed: 80 }
        ];

        let scene, camera, renderer, clock, terrain;
        let bikeRig, handlebarGroup, frontWheel, rearWheel, frontFender;
        let audioCtx, osc, gainNode;

        let state = {
            active: false,
            bikeIdx: 0,
            pos: new THREE.Vector3(0, 0, 0),
            velY: 0,
            speed: 0,
            yaw: 0,
            pitch: 0,
            roll: 0,
            steerAngle: 0,
            rpm: 1000,
            isGrounded: true
        };

        const input = { w: 0, s: 0, a: 0, d: 0, space: 0 };

        // --- UI HANDLERS ---
        window.selectBike = (idx, el) => {
            state.bikeIdx = idx;
            document.querySelectorAll('.bike-option').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        };

        window.startEngine = () => {
            document.getElementById('ui-wrapper').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ui-wrapper').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                initAudio();
                initThree();
                state.active = true;
            }, 600);
        };

        // --- PHYSICS HELPERS ---
        function getTerrainHeight(x, z) {
            const ray = new THREE.Raycaster(new THREE.Vector3(x, 1000, z), new THREE.Vector3(0, -1, 0));
            const hit = ray.intersectObject(terrain);
            return hit.length > 0 ? hit[0].point.y : 0;
        }

        // --- CORE ENGINE ---
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x90caf9); // Brighter sky
            scene.fog = new THREE.FogExp2(0x90caf9, 0.003);
            clock = new THREE.Clock();

            // Narrower FOV for speed sensation
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 5000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.8);
            light.position.set(300, 500, 100);
            light.castShadow = true;
            light.shadow.camera.top = 1000; light.shadow.camera.bottom = -1000;
            light.shadow.camera.left = -1000; light.shadow.camera.right = 1000;
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            createWorld();
            createBikeModel();
            setupControls();

            // Critical: Ground the bike before first frame
            const initialH = getTerrainHeight(0, 0);
            state.pos.set(0, initialH + 1.2, 0);

            animate();
        }

        function createWorld() {
            const size = 5000, segs = 200;
            const geo = new THREE.PlaneGeometry(size, size, segs, segs);
            const pos = geo.attributes.position.array;

            // Displacement Logic
            for (let i = 0; i < pos.length; i += 3) {
                const x = pos[i], y = pos[i+1];
                let h = Math.sin(x * 0.01) * 15 + Math.cos(y * 0.01) * 15;
                h += Math.sin(x * 0.1) * 1.5; // Surface bumps
                
                // Track Path
                const trackMask = Math.abs(x + Math.sin(y * 0.015) * 60);
                if (trackMask < 25) h -= 2; 

                pos[i+2] = h;
            }

            geo.computeVertexNormals();

            // Create Canvas Texture for Realism
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#6d4c41';
            ctx.fillRect(0,0,1024,1024);
            for(let i=0; i<40000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#5d4037' : '#795548';
                ctx.fillRect(Math.random()*1024, Math.random()*1024, 2, 2);
            }
            
            const dirtMap = new THREE.CanvasTexture(canvas);
            dirtMap.wrapS = dirtMap.wrapT = THREE.RepeatWrapping;
            dirtMap.repeat.set(100, 100);

            terrain = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ 
                map: dirtMap, roughness: 1.0, metalness: 0 
            }));
            terrain.rotation.x = -Math.PI / 2;
            terrain.receiveShadow = true;
            scene.add(terrain);
        }

        function createBikeModel() {
            bikeRig = new THREE.Group();
            scene.add(bikeRig);

            const spec = BIKE_SPECS[state.bikeIdx];
            const matPlastic = new THREE.MeshStandardMaterial({ color: spec.color, roughness: 0.2 });
            const matSteel = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9 });
            const matRubber = new THREE.MeshStandardMaterial({ color: 0x111111 });

            // 1. Frame
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.2, 2.5), matSteel);
            frame.position.y = 1;
            bikeRig.add(frame);

            // 2. Front End (This moves with steering)
            handlebarGroup = new THREE.Group();
            handlebarGroup.position.set(0, 1.8, 1.2);
            bikeRig.add(handlebarGroup);

            const forks = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 4), matSteel);
            forks.rotation.x = -0.3;
            forks.position.set(0.3, 0.4, 0.1);
            handlebarGroup.add(forks);
            const forksR = forks.clone(); forksR.position.x = -0.3;
            handlebarGroup.add(forksR);

            // 3. The Fender (Visible in FPV)
            frontFender = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 1.8), matPlastic);
            frontFender.position.set(0, 0.8, 0.5);
            frontFender.rotation.x = 0.2;
            handlebarGroup.add(frontFender);

            // 4. Handlebars
            const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 2), matRubber);
            bar.rotation.z = Math.PI / 2;
            bar.position.y = 2.4;
            handlebarGroup.add(bar);

            const barPad = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.6), matPlastic);
            barPad.rotation.z = Math.PI / 2;
            barPad.position.y = 2.4;
            handlebarGroup.add(barPad);

            // Wheels
            frontWheel = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.4, 0.25, 16), matRubber);
            frontWheel.rotation.z = Math.PI / 2;
            frontWheel.position.set(0, -1.8, 0.8);
            handlebarGroup.add(frontWheel);

            rearWheel = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 0.5, 16), matRubber);
            rearWheel.rotation.z = Math.PI / 2;
            rearWheel.position.set(0, 1.3, -2.1);
            bikeRig.add(rearWheel);

            // 5. THE CAMERA (HELMET POV)
            // Tuned to see the fender and bar pad
            camera.position.set(0, 4.4, -0.6);
            camera.rotation.x = -0.35; // Looking down the fender
            bikeRig.add(camera);
        }

        function setupControls() {
            const handleKey = (e, val) => {
                const k = e.code;
                if(k==='KeyW') input.w = val;
                if(k==='KeyS') input.s = val;
                if(k==='KeyA') input.a = val;
                if(k==='KeyD') input.d = val;
                if(k==='Space') input.space = val;
            };
            window.onkeydown = (e) => handleKey(e, 1);
            window.onkeyup = (e) => handleKey(e, 0);
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            osc = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            gainNode.gain.value = 0.05;
        }

        function animate() {
            if(!state.active) return requestAnimationFrame(animate);
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            const spec = BIKE_SPECS[state.bikeIdx];

            // --- CORRECTED CONTROLS & PHYSICS ---
            
            // 1. Terrain Probe
            const groundY = getTerrainHeight(state.pos.x, state.pos.z);
            state.isGrounded = state.pos.y <= groundY + 1.6;

            if (state.isGrounded) {
                // Throttle: W is Positive, S is Negative (Braking/Reverse)
                if (input.w) state.speed += spec.accel * 45 * dt;
                if (input.s) state.speed -= 80 * dt; 
                state.speed *= 0.98; // Friction

                // Steering: D is Right (+Yaw), A is Left (-Yaw)
                // Corrected Inversion
                const targetSteer = (input.a - input.d) * 0.7;
                state.steerAngle = THREE.MathUtils.lerp(state.steerAngle, targetSteer, 0.1);
                state.yaw += state.steerAngle * (state.speed * 0.02) * dt;

                state.pos.y = groundY + 1.5;
                state.velY = 0;

                if (input.space) state.velY = 16;
            } else {
                state.velY -= 35 * dt; // Gravity
                state.speed *= 0.995;
            }

            // 2. Integration (X/Z movement based on yaw)
            state.pos.x += Math.sin(state.yaw) * state.speed * dt;
            state.pos.z += Math.cos(state.yaw) * state.speed * dt;
            state.pos.y += state.velY * dt;

            // 3. Visual Updates
            bikeRig.position.copy(state.pos);
            
            // Lean Logic: More speed + turn = more lean
            state.roll = THREE.MathUtils.lerp(state.roll, state.steerAngle * (state.speed * 0.01), 0.1);
            bikeRig.rotation.set(state.pitch, state.yaw, state.roll);
            
            handlebarGroup.rotation.y = state.steerAngle;
            frontWheel.rotation.x -= state.speed * dt * 0.5;
            rearWheel.rotation.x -= state.speed * dt * 0.5;

            // 4. Audio & HUD
            state.rpm = 1000 + (Math.abs(state.speed) * 120) + (input.w * 3500);
            if (audioCtx) {
                osc.frequency.setTargetAtTime(state.rpm / 20, audioCtx.currentTime, 0.05);
                gainNode.gain.setTargetAtTime(0.05 + (state.rpm / 12000) * 0.1, audioCtx.currentTime, 0.05);
            }

            // Camera Vibration
            const vibe = Math.sin(Date.now() * 0.05) * (state.rpm / 25000);
            camera.position.y = 4.4 + vibe;

            document.getElementById('hud-speed').innerText = Math.round(Math.abs(state.speed * 1.5));
            document.getElementById('hud-rpm').style.width = (state.rpm / 14000 * 100) + '%';

            renderer.render(scene, camera);
        }

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

    </script>
</body>
</html>
