<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JCMX | Pro-Spec Simulator</title>
    
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="apple-touch-icon" href="../favicon.png">
    <meta name="apple-mobile-web-app-title" content="JC Mini Games">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <style>
        :root {
            --kx-green: #39ff14;
            --crf-red: #ff1100;
            --yz-blue: #0055ff;
            --ui-gold: #ffcc00;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #050505;
            color: #fff; font-family: 'Arial Black', sans-serif;
            user-select: none; touch-action: none;
        }

        canvas { display: block; }

        /* --- GARAGE MENU --- */
        #menu-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }

        .brand-header { text-align: center; margin-bottom: 40px; }
        .jcmx-title {
            font-size: 8rem; font-style: italic; letter-spacing: -5px;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0; line-height: 0.8; filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }
        .jcmx-sub { letter-spacing: 12px; color: var(--ui-gold); font-size: 1rem; margin-top: 10px; opacity: 0.8; }

        .garage-container {
            width: 80%; max-width: 900px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 40px; border-radius: 20px; backdrop-filter: blur(10px);
        }

        .bike-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
        .bike-card {
            padding: 20px; border: 2px solid #222; border-radius: 10px;
            cursor: pointer; transition: 0.3s; background: #0a0a0a;
        }
        .bike-card:hover { border-color: #444; transform: translateY(-3px); }
        .bike-card.active { border-color: var(--active-color); box-shadow: 0 0 20px var(--active-color); }
        .bike-card h3 { margin: 0; font-size: 1.2rem; }
        .bike-card p { font-size: 0.7rem; color: #666; margin-top: 5px; text-transform: uppercase; }

        .btn-start {
            margin-top: 30px; padding: 20px 60px; font-size: 2rem;
            background: #fff; color: #000; border: none; border-radius: 50px;
            cursor: pointer; font-weight: 900; transition: 0.2s;
        }
        .btn-start:hover { transform: scale(1.05); background: var(--ui-gold); }

        /* --- HUD --- */
        #hud {
            position: absolute; inset: 0; pointer-events: none;
            display: none; z-index: 50;
        }
        .speed-cluster {
            position: absolute; bottom: 50px; right: 50px; text-align: right;
            border-right: 5px solid var(--ui-gold); padding-right: 20px;
        }
        .speed-val { font-size: 6rem; line-height: 0.9; }
        .speed-unit { font-size: 1.2rem; color: #666; }

        .rpm-gauge {
            position: absolute; bottom: 50px; left: 50px; width: 300px;
        }
        .rpm-track { height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .rpm-fill { height: 100%; width: 10%; background: var(--ui-gold); }
    </style>
</head>
<body>

    <div id="menu-overlay">
        <div class="brand-header">
            <h1 class="jcmx-title">JCMX</h1>
            <div class="jcmx-sub">ADVANCED SIMULATION</div>
        </div>

        <div class="garage-container">
            <div class="bike-grid">
                <div class="bike-card active" style="--active-color: var(--kx-green)" onclick="setBike(0, this)">
                    <h3 style="color: var(--kx-green)">KX 85</h3>
                    <p>High Rev / 2-Stroke</p>
                </div>
                <div class="bike-card" style="--active-color: var(--crf-red)" onclick="setBike(1, this)">
                    <h3 style="color: var(--crf-red)">CRF 450</h3>
                    <p>Factory 4-Stroke / Torque</p>
                </div>
                <div class="bike-card" style="--active-color: var(--yz-blue)" onclick="setBike(2, this)">
                    <h3 style="color: var(--yz-blue)">YZ 250</h3>
                    <p>Competition / Powerband</p>
                </div>
            </div>
            <button class="btn-start" onclick="ignition()">RIDE</button>
        </div>
    </div>

    <div id="hud">
        <div class="speed-cluster">
            <div class="speed-val" id="sp-val">0</div>
            <div class="speed-unit">MPH</div>
        </div>
        <div class="rpm-gauge">
            <div style="font-size: 0.8rem; color: #555;">ENGINE TACH</div>
            <div class="rpm-track"><div class="rpm-fill" id="rpm-f"></div></div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ENGINE VARS ---
        let scene, camera, renderer, clock, terrain;
        let bikeRoot, forkAssembly, handlebars, frontWheel, rearWheel;
        let bikeSpecs = [
            { name: "KX85", color: 0x39ff14, mass: 160, torque: 1.2 },
            { name: "CRF450", color: 0xff1100, mass: 240, torque: 2.5 },
            { name: "YZ250", color: 0x0055ff, mass: 215, torque: 1.9 }
        ];

        let state = {
            active: false, bikeIdx: 0,
            pos: new THREE.Vector3(0, 0, 0),
            vel: new THREE.Vector3(0, 0, 0),
            yaw: 0, pitch: 0, roll: 0,
            steer: 0, speed: 0, rpm: 1000,
            grounded: true, suspension: 0
        };

        let input = { w:0, s:0, a:0, d:0, space:0, up:0, down:0 };
        let audioCtx, osc, gain;

        // --- UI LOGIC ---
        window.setBike = (idx, el) => {
            state.bikeIdx = idx;
            document.querySelectorAll('.bike-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        };

        window.ignition = () => {
            document.getElementById('menu-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('menu-overlay').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                initGame();
                initAudio();
                state.active = true;
            }, 800);
        };

        // --- CORE INITIALIZATION ---
        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.004);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(200, 400, 100);
            sun.castShadow = true;
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));

            createWorld();
            createBike();
            setupInput();

            // Ground the bike immediately
            state.pos.y = getTerrainHeight(0, 0) + 1.6;
            
            loop();
        }

        // --- PROCEDURAL TEXTURED WORLD ---
        function createWorld() {
            const size = 3000, segs = 150;
            const geo = new THREE.PlaneGeometry(size, size, segs, segs);
            const pos = geo.attributes.position.array;

            // Heightmap Generation
            for (let i = 0; i < pos.length; i += 3) {
                const x = pos[i], y = pos[i+1];
                // Large hills + Small bumps
                let h = Math.sin(x * 0.01) * 20 + Math.cos(y * 0.01) * 20;
                h += Math.sin(x * 0.1) * 1.5; 
                
                // Track Path (Clearer area)
                const path = Math.abs(x + Math.sin(y * 0.02) * 50);
                if (path < 20) h -= 2;

                pos[i+2] = h;
            }
            geo.computeVertexNormals();

            // Create Dirt Texture on Canvas
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#5d4037';
            ctx.fillRect(0,0,512,512);
            for(let i=0; i<5000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#4e342e' : '#6d4c41';
                ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2);
            }
            const dirtTex = new THREE.CanvasTexture(canvas);
            dirtTex.wrapS = dirtTex.wrapT = THREE.RepeatWrapping;
            dirtTex.repeat.set(80, 80);

            terrain = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ 
                map: dirtTex, roughness: 1, metalness: 0 
            }));
            terrain.rotation.x = -Math.PI / 2;
            terrain.receiveShadow = true;
            scene.add(terrain);
        }

        // --- HI-RES BIKE MODEL (COMPONENT DRIVEN) ---
        function createBike() {
            bikeRoot = new THREE.Group();
            scene.add(bikeRoot);

            const spec = bikeSpecs[state.bikeIdx];
            const matPlastic = new THREE.MeshStandardMaterial({ color: spec.color, roughness: 0.3 });
            const matMetal = new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.8 });
            const matBlack = new THREE.MeshStandardMaterial({ color: 0x111111 });

            // Frame & Engine
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.2, 2.5), matMetal);
            frame.position.y = 1.2;
            bikeRoot.add(frame);

            // Rear Suspension / Swingarm
            const swingarm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.2, 1.5), matMetal);
            swingarm.position.set(0, 0.8, -1.2);
            bikeRoot.add(swingarm);

            rearWheel = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 0.4, 16), matBlack);
            rearWheel.rotation.z = Math.PI/2;
            rearWheel.position.set(0, 1.3, -2.2);
            bikeRoot.add(rearWheel);

            // Front End (FPV Focus)
            forkAssembly = new THREE.Group();
            forkAssembly.position.set(0, 1.8, 1.5);
            bikeRoot.add(forkAssembly);

            const forks = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 4), matMetal);
            forks.rotation.x = -0.3;
            forks.position.set(0.25, 0.5, 0.2);
            forkAssembly.add(forks);
            const forksR = forks.clone(); forksR.position.x = -0.25;
            forkAssembly.add(forksR);

            // Handlebars - DETAILED
            handlebars = new THREE.Group();
            handlebars.position.set(0, 2.4, -0.1);
            forkAssembly.add(handlebars);

            const barTube = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 2), matBlack);
            barTube.rotation.z = Math.PI/2;
            handlebars.add(barTube);

            const barPad = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.6), matPlastic);
            barPad.rotation.z = Math.PI/2;
            handlebars.add(barPad);

            const gripL = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.4), matBlack);
            gripL.rotation.z = Math.PI/2; gripL.position.set(-0.9, 0, 0);
            handlebars.add(gripL);
            const gripR = gripL.clone(); gripR.position.x = 0.9;
            handlebars.add(gripR);

            frontWheel = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.4, 0.2, 16), matBlack);
            frontWheel.rotation.z = Math.PI/2;
            frontWheel.position.set(0, -1.8, 0.7);
            forkAssembly.add(frontWheel);

            // Camera Mounting (Helmet Position)
            camera.position.set(0, 4.5, -0.8);
            camera.rotation.x = -0.25;
            bikeRoot.add(camera);
        }

        function getTerrainHeight(x, z) {
            const ray = new THREE.Raycaster(new THREE.Vector3(x, 1000, z), new THREE.Vector3(0, -1, 0));
            const hit = ray.intersectObject(terrain);
            return hit.length > 0 ? hit[0].point.y : 0;
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            osc = audioCtx.createOscillator();
            gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.value = 0.05;
        }

        function setupInput() {
            const k = (key, val) => window.addEventListener(key === 'down' ? 'keydown' : 'keyup', e => {
                const map = { KeyW:'w', KeyS:'s', KeyA:'a', KeyD:'d', Space:'space', ArrowUp:'up', ArrowDown:'down' };
                if (map[e.code]) input[map[e.code]] = (key === 'down' ? 1 : 0);
            });
            k('down'); k('up');
        }

        // --- MAIN LOOP ---
        function loop() {
            if (!state.active) return requestAnimationFrame(loop);
            requestAnimationFrame(loop);

            const dt = Math.min(clock.getDelta(), 0.1);
            const spec = bikeSpecs[state.bikeIdx];

            // 1. Terrain Probe
            const h = getTerrainHeight(state.pos.x, state.pos.z);
            state.grounded = state.pos.y <= h + 1.6;

            // 2. Physics & Controls
            if (state.grounded) {
                // Throttle
                if (input.w) state.speed += spec.torque * 50 * dt;
                if (input.s) state.speed -= 80 * dt;
                state.speed *= 0.98;

                // Steering (A = Turn Left, D = Turn Right)
                const steerTarget = (input.a - input.d) * 0.6;
                state.steer = THREE.MathUtils.lerp(state.steer, steerTarget, 0.1);
                state.yaw += state.steer * (state.speed * 0.02) * dt;

                // Snapping to Ground
                state.pos.y = h + 1.5;
                state.vel.y = 0;
                
                // Jump
                if (input.space) state.vel.y = 15;
            } else {
                state.vel.y -= 35 * dt; // Gravity
                state.speed *= 0.99;
                // In-air lean
                if (input.up) state.pitch -= 2 * dt;
                if (input.down) state.pitch += 2 * dt;
            }

            // 3. Integration
            state.pos.x += Math.sin(state.yaw) * state.speed * dt;
            state.pos.z += Math.cos(state.yaw) * state.speed * dt;
            state.pos.y += state.vel.y * dt;

            // 4. Component Animation
            bikeRoot.position.copy(state.pos);
            bikeRoot.rotation.set(state.pitch, state.yaw, state.steer * 0.5);
            
            forkAssembly.rotation.y = state.steer;
            frontWheel.rotation.x -= state.speed * dt * 0.5;
            rearWheel.rotation.x -= state.speed * dt * 0.5;

            // Camera Vibration based on RPM
            state.rpm = 1000 + Math.abs(state.speed) * 120 + (input.w * 3000);
            const vibe = Math.sin(Date.now() * 0.05) * (state.rpm / 20000);
            camera.position.y = 4.5 + vibe;

            // 5. Audio & HUD
            if (audioCtx) {
                osc.frequency.setTargetAtTime(state.rpm / 15, audioCtx.currentTime, 0.1);
                gain.gain.setTargetAtTime(0.05 + (state.rpm / 10000) * 0.1, audioCtx.currentTime, 0.1);
            }

            document.getElementById('sp-val').innerText = Math.abs(Math.round(state.speed * 1.5));
            document.getElementById('rpm-f').style.width = (state.rpm / 12000 * 100) + '%';

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
