<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JCMX</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hud">
        <div id="title">JCMX</div>
        <div id="info">
            <span id="brandLabel">XK 85</span> |
            <span id="strokeLabel">2‑Stroke</span> |
            <span id="speedLabel">0 km/h</span> |
            <span id="flipLabel">Flips: 0</span> |
            <span id="distanceLabel">0 m</span>
        </div>

        <div id="controls">
            <div>
                <span class="label">Brand:</span>
                <button data-bike="xk">Kawasaki XK</button>
                <button data-bike="rc">KTM RC</button>
                <button data-bike="ym">Yamaha YM</button>
            </div>
            <div>
                <span class="label">Stroke:</span>
                <button data-stroke="2">2‑Stroke</button>
                <button data-stroke="4">4‑Stroke</button>
            </div>
        </div>

        <div id="help">
            Arrow Up = Throttle • Arrow Down = Brake  
            Arrow Left/Right = Tilt • Space = Restart
        </div>
    </div>

    <canvas id="gameCanvas" width="1100" height="550"></canvas>

    <script src="game.js"></script>
</body>
</html>
