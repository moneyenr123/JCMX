<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JCMX - First Person Moto Simulator</title>
    
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="apple-touch-icon" href="../favicon.png">
    <meta name="apple-mobile-web-app-title" content="JCMX">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <style>
        :root { --kx-green: #00ff00; --crf-red: #ff0000; --yz-blue: #0022ff; --bg: #0a0a0c; }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body { overflow: hidden; background: var(--bg); font-family: 'Arial Black', Impact, sans-serif; color: white; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* JCMX Branding Menu */
        #menu-wrapper {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a24 0%, #000000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .logo-container { text-align: center; margin-bottom: 40px; }
        .jcmx-logo { 
            font-size: 8rem; font-style: italic; font-weight: 900; line-height: 1;
            background: linear-gradient(to bottom, #ffffff, #aaaaaa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0px 10px 20px rgba(0,0,0,0.8); letter-spacing: -5px; margin: 0;
        }
        .subtitle { color: #888; font-size: 1.5rem; letter-spacing: 10px; text-transform: uppercase; margin-top: -10px; }

        /* Selection UI */
        .selection-panel {
            background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            text-align: center; max-width: 800px; width: 90%;
        }
        h2 { font-size: 1.2rem; color: #aaa; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-grid { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
        .select-btn {
            background: rgba(0,0,0,0.5); border: 2px solid #333; color: white;
            padding: 15px 25px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            border-radius: 8px; transition: 0.2s all; flex: 1; min-width: 150px;
        }
        
        /* Brand Colors */
        .kx-btn { border-left: 5px solid var(--kx-green); } .kx-btn.active { background: var(--kx-green); color: black; border-color: var(--kx-green); }
        .crf-btn { border-left: 5px solid var(--crf-red); } .crf-btn.active { background: var(--crf-red); color: white; border-color: var(--crf-red); }
        .yz-btn { border-left: 5px solid var(--yz-blue); } .yz-btn.active { background: var(--yz-blue); color: white; border-color: var(--yz-blue); }
        
        .map-btn.active { background: white; color: black; border-color: white; }

        .start-btn {
            background: white; color: black; font-size: 2rem; padding: 20px 60px;
            border: none; border-radius: 50px; cursor: pointer; font-weight: 900;
            text-transform: uppercase; box-shadow: 0 10px 30px rgba(255,255,255,0.2);
            transition: transform 0.1s;
        }
        .start-btn:active { transform: scale(0.95); }

        /* In-Game HUD */
        #hud { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 10; }
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 4px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        
        .dashboard {
            position: absolute; bottom: 30px; right: 40px; text-align: right;
            background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 10px;
            border-bottom: 4px solid var(--kx-green); backdrop-filter: blur(5px);
        }
        .speed-readout { font-size: 3.5rem; font-weight: 900; line-height: 1; margin-bottom: -5px; }
        .gear-readout { font-size: 1.2rem; color: #ccc; }
        
        /* Dirt Overlay */
        #screen-dirt { position: absolute; inset: 0; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.05"/></svg>'); pointer-events: none; z-index: 100; mix-blend-mode: overlay; display: none;}
    </style>
</head>
<body>

    <div id="menu-wrapper">
        <div class="logo-container">
            <h1 class="jcmx-logo">JCMX</h1>
            <div class="subtitle">First Person Simulator</div>
        </div>

        <div class="selection-panel">
            <h2>Select Machine</h2>
            <div class="btn-grid">
                <button class="select-btn kx-btn active" onclick="setBike(0, this, '#00ff00')">KX 85</button>
                <button class="select-btn crf-btn" onclick="setBike(1, this, '#ff0000')">CRF 450</button>
                <button class="select-btn yz-btn" onclick="setBike(2, this, '#0022ff')">YZ 250</button>
            </div>

            <h2>Select Location</h2>
            <div class="btn-grid">
                <button class="select-btn map-btn active" onclick="setMap('track', this)">Motocross Track</button>
                <button class="select-btn map-btn" onclick="setMap('trail', this)">Forest Trail</button>
            </div>

            <button class="start-btn" onclick="bootEngine()">RIDE</button>
            <p style="color: #666; margin-top: 20px; font-family: sans-serif; font-size: 0.9rem;">
                CONTROLS: <b>W/S</b> Gas & Brake | <b>A/D</b> Steer | <b>Arrows</b> Lean FWD/BACK | <b>Space</b> Jump
            </p>
        </div>
    </div>

    <div id="hud">
        <div class="crosshair"></div>
        <div class="dashboard" id="dash-color">
            <div class="speed-readout"><span id="speed-val">0</span> <span style="font-size: 1rem;">MPH</span></div>
            <div class="gear-readout">GEAR: <span id="gear-val">1</span> | RPM: <span id="rpm-val">1000</span></div>
        </div>
    </div>
    <div id="screen-dirt"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- GAME STATE ---
        let scene, camera, renderer, terrain, clock;
        let bikeRig, handlebars, frontFender, frontWheel, rearWheel;
        let particles = [];
        
        let config = { bikeIdx: 0, bikeColors: [0x00ff00, 0xff0000, 0x0022ff], map: 'track', isRunning: false };
        let physics = { x: 0, y: 0, z: 0, vx: 0, vy: 0, speed: 0, rpm: 1000, yaw: 0, pitch: 0, roll: 0, steerAngle: 0, wheelbase: 3.8, suspensionOffset: 0 };
        let input = { gas: 0, brake: 0, steer: 0, lean: 0, jump: false };

        // --- AUDIO ENGINE ---
        let audioCtx, engineOsc, engineGain;

        // UI Binding
        window.setBike = (idx, btn, color) => {
            config.bikeIdx = idx;
            document.querySelectorAll('.kx-btn, .crf-btn, .yz-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('dash-color').style.borderBottomColor = color;
        };
        window.setMap = (type, btn) => {
            config.map = type;
            document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
        window.bootEngine = () => {
            document.getElementById('menu-wrapper').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('screen-dirt').style.display = 'block';
            initAudio();
            init3D();
            config.isRunning = true;
        };

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            engineOsc = audioCtx.createOscillator();
            engineGain = audioCtx.createGain();
            
            // Gritty sawtooth wave for dirt bike engine
            engineOsc.type = 'sawtooth';
            engineOsc.frequency.value = 60; // Idle RPM
            
            engineGain.gain.value = 0.1; // Idle Volume
            
            engineOsc.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();
        }

        // --- 3D ENGINE SETUP ---
        function init3D() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.FogExp2(0x87CEEB, config.map === 'trail' ? 0.008 : 0.003);

            // First Person Camera (Attached to Rider Head)
            camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 2000);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(200, 300, 100);
            sun.castShadow = true;
            sun.shadow.camera.top = 200; sun.shadow.camera.bottom = -200;
            sun.shadow.camera.left = -200; sun.shadow.camera.right = 200;
            scene.add(sun);

            buildFPVBike();
            buildEnvironment();
            setupInput();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Initial grounded spawn
            physics.y = getTerrainHeight(0, 0) + 1.5;
            animate();
        }

        function buildFPVBike() {
            // Main rig holds everything and moves through the world
            bikeRig = new THREE.Group();
            scene.add(bikeRig);

            const matPlastic = new THREE.MeshStandardMaterial({ color: config.bikeColors[config.bikeIdx], roughness: 0.3 });
            const matMetal = new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.9, roughness: 0.2 });
            const matBlack = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
            const matGrip = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });

            // The Steering Assembly (Rotates with A/D)
            handlebars = new THREE.Group();
            handlebars.position.set(0, 4.0, 1.0); // Placed relative to rig
            bikeRig.add(handlebars);

            // Crossbar & Pad
            const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.8), matBlack);
            bar.rotation.z = Math.PI / 2;
            handlebars.add(bar);
            
            const pad = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6), matPlastic);
            pad.rotation.z = Math.PI / 2;
            pad.position.set(0, 0.1, 0);
            handlebars.add(pad);

            // Grips
            const leftGrip = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.3), matGrip);
            leftGrip.rotation.z = Math.PI / 2; leftGrip.position.set(-0.85, 0, 0); handlebars.add(leftGrip);
            const rightGrip = leftGrip.clone(); rightGrip.position.set(0.85, 0, 0); handlebars.add(rightGrip);

            // Brake / Clutch Levers
            const leverGeo = new THREE.BoxGeometry(0.2, 0.02, 0.05);
            const clutch = new THREE.Mesh(leverGeo, matMetal); clutch.position.set(-0.6, 0, 0.1); clutch.rotation.y = 0.2; handlebars.add(clutch);
            const brakeL = new THREE.Mesh(leverGeo, matMetal); brakeL.position.set(0.6, 0, 0.1); brakeL.rotation.y = -0.2; handlebars.add(brakeL);

            // Front Fender (Visible in 1st person)
            frontFender = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.05, 1.5), matPlastic);
            frontFender.position.set(0, -0.6, 0.8);
            frontFender.rotation.x = 0.2;
            handlebars.add(frontFender);

            // Front Wheel (Visible just past the fender)
            frontWheel = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.4, 0.2, 24), matBlack);
            frontWheel.rotation.z = Math.PI / 2;
            frontWheel.position.set(0, -2.5, 1.5);
            handlebars.add(frontWheel); // Attached to handlebars so it turns

            // Rear Wheel (Invisible to camera, but needed for physics references later if switching views)
            rearWheel = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 0.3, 24), matBlack);
            rearWheel.rotation.z = Math.PI / 2;
            rearWheel.position.set(0, 1.3, -2.0);
            bikeRig.add(rearWheel);

            // Add Camera to Rig (Head Position)
            camera.position.set(0, 4.8, -0.2); // Just behind the handlebars
            bikeRig.add(camera);
        }

        function buildEnvironment() {
            const size = 3000, segs = 250;
            const geo = new THREE.PlaneGeometry(size, size, segs, segs);
            const pos = geo.attributes.position.array;

            let matColor = config.map === 'track' ? 0x6d4c41 : 0x3e2723; // Light dirt vs Dark forest dirt

            for (let i = 0; i < pos.length; i += 3) {
                let x = pos[i], y = pos[i+1];
                let z = 0;

                if (config.map === 'track') {
                    // Motocross Supercross Style Topography
                    z = Math.sin(x * 0.02) * Math.cos(y * 0.02) * 8; // Rolling hills
                    
                    // Main Rhythm Section (Center line)
                    if (Math.abs(x) < 40) {
                        const jumpPhase = Math.sin(y * 0.06);
                        if (jumpPhase > 0.5) z += (jumpPhase - 0.5) * 40; // Steep kicker
                        else if (jumpPhase < -0.5) z += 5; // Landing mound
                    }
                    
                    // Whoops section
                    if (x > 50 && x < 80) z += Math.sin(y * 0.4) * 3; 
                } 
                else if (config.map === 'trail') {
                    // Bumpy, uneven natural terrain
                    z = Math.sin(x * 0.01) * 20 + Math.cos(y * 0.015) * 15;
                    z += Math.sin(x * 0.1) * 1.5; // micro bumps
                    
                    // Flatten a trail
                    let trailMask = Math.abs(x + Math.sin(y * 0.01) * 100);
                    if (trailMask < 15) z -= 5; 
                }
                pos[i+2] = z;
            }
            
            geo.computeVertexNormals();
            terrain = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: matColor, roughness: 1.0, flatShading: true }));
            terrain.rotation.x = -Math.PI/2;
            terrain.receiveShadow = true;
            scene.add(terrain);

            // Decorate Map
            for(let i=0; i < (config.map === 'trail' ? 500 : 50); i++) {
                let rx = (Math.random() - 0.5) * size;
                let rz = (Math.random() - 0.5) * size;
                let rh = getTerrainHeight(rx, rz);
                
                // Keep trail/track clear
                if (config.map === 'track' && Math.abs(rx) < 100) continue;
                if (config.map === 'trail' && Math.abs(rx + Math.sin(rz * 0.01) * 100) < 25) continue;

                if (config.map === 'trail') {
                    // Pine Trees
                    const tree = new THREE.Group();
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 1, 8), new THREE.MeshStandardMaterial({color: 0x2e1b0f}));
                    const leaves = new THREE.Mesh(new THREE.ConeGeometry(5, 25, 8), new THREE.MeshStandardMaterial({color: 0x1b4d20}));
                    leaves.position.y = 12; trunk.position.y = 4;
                    tree.add(trunk); tree.add(leaves);
                    tree.position.set(rx, rh, rz);
                    tree.castShadow = true;
                    scene.add(tree);
                } else {
                    // Track Banners / Hay Bales
                    const bale = new THREE.Mesh(new THREE.BoxGeometry(3, 1.5, 1.5), new THREE.MeshStandardMaterial({color: 0xddcc88}));
                    bale.position.set(rx, rh + 0.75, rz);
                    scene.add(bale);
                }
            }
        }

        function getTerrainHeight(x, z) {
            const ray = new THREE.Raycaster(new THREE.Vector3(x, 500, z), new THREE.Vector3(0, -1, 0));
            const hit = ray.intersectObject(terrain);
            return hit.length > 0 ? hit[0].point.y : 0;
        }

        function setupInput() {
            window.addEventListener('keydown', e => {
                if(e.code==='KeyW') input.gas = 1;
                if(e.code==='KeyS') input.brake = 1;
                if(e.code==='KeyA') input.steer = 1;
                if(e.code==='KeyD') input.steer = -1;
                if(e.code==='ArrowUp') input.lean = -1; // Lean Forward
                if(e.code==='ArrowDown') input.lean = 1; // Lean Back
                if(e.code==='Space') input.jump = true;
            });
            window.addEventListener('keyup', e => {
                if(e.code==='KeyW') input.gas = 0;
                if(e.code==='KeyS') input.brake = 0;
                if(e.code==='KeyA' || e.code==='KeyD') input.steer = 0;
                if(e.code==='ArrowUp' || e.code==='ArrowDown') input.lean = 0;
                if(e.code==='Space') input.jump = false;
            });
        }

        function kickDirt(x, y, z, velZ) {
            if(particles.length > 100) return;
            const p = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshBasicMaterial({color: 0x4e342e}));
            p.position.set(x + (Math.random()-0.5), y, z + (Math.random()-0.5));
            p.userData = { vx: (Math.random()-0.5)*0.5, vy: Math.random()*1 + 0.5, vz: velZ * 0.1, life: 1.0 };
            scene.add(p); particles.push(p);
        }

        // --- GAME LOOP ---
        function animate() {
            if (!config.isRunning) return requestAnimationFrame(animate);
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);

            // Calculate exact wheel positions for suspension math
            const fX = physics.x + Math.sin(physics.yaw) * (physics.wheelbase/2);
            const fZ = physics.z + Math.cos(physics.yaw) * (physics.wheelbase/2);
            const rX = physics.x - Math.sin(physics.yaw) * (physics.wheelbase/2);
            const rZ = physics.z - Math.cos(physics.yaw) * (physics.wheelbase/2);

            const gFront = getTerrainHeight(fX, fZ);
            const gRear = getTerrainHeight(rX, rZ);
            
            const rideHeightLimit = Math.max(gFront, gRear) + 1.5;
            const isGrounded = physics.y <= rideHeightLimit + 0.2;

            if (isGrounded) {
                // Ground Physics
                if (input.gas) {
                    physics.speed += 60 * dt; // Acceleration
                    if(physics.speed < 20) kickDirt(rX, gRear, rZ, -physics.speed); // Roost
                }
                if (input.brake) physics.speed -= 80 * dt; // Braking
                physics.speed *= 0.98; // Rolling resistance

                // Steering
                physics.steerAngle = THREE.MathUtils.lerp(physics.steerAngle, input.steer * 0.5, 0.1);
                if (physics.speed > 2) {
                    physics.yaw += physics.steerAngle * dt * 3; // Turn bike
                }

                // Match ground incline
                const targetPitch = Math.atan2(gRear - gFront, physics.wheelbase);
                physics.pitch = THREE.MathUtils.lerp(physics.pitch, targetPitch, 0.2);

                // Body Roll based on steering & speed
                const targetRoll = physics.steerAngle * Math.min(physics.speed * 0.02, 0.8);
                physics.roll = THREE.MathUtils.lerp(physics.roll, targetRoll, 0.1);

                // Suspension Compression (Camera Shake)
                if (physics.vy < -10) physics.suspensionOffset = -1.0; // Hard landing dip
                physics.y = rideHeightLimit;
                physics.vy = 0;

                // Bunny Hop Preload
                if (input.jump) physics.vy = 15;

            } else {
                // Air Physics
                physics.vy -= 30 * dt; // Gravity
                physics.speed *= 0.995;
                
                // In-air corrections
                physics.steerAngle = THREE.MathUtils.lerp(physics.steerAngle, input.steer * 0.2, 0.1);
                if (input.lean !== 0) physics.pitch += input.lean * dt * 2; // Front/Back Flips
            }

            // Suspension Return Spring
            physics.suspensionOffset = THREE.MathUtils.lerp(physics.suspensionOffset, 0, 0.1);

            // Apply Velocity
            physics.x += Math.sin(physics.yaw + physics.steerAngle*0.2) * physics.speed * dt;
            physics.y += physics.vy * dt;
            physics.z += Math.cos(physics.yaw + physics.steerAngle*0.2) * physics.speed * dt;

            // Audio Synthesis Update
            if (audioCtx) {
                let targetRPM = 1000 + Math.abs(physics.speed) * 150;
                if (input.gas) targetRPM += 2000; // Throttle rev
                if (!isGrounded && input.gas) targetRPM += 4000; // Free spin in air
                
                physics.rpm = THREE.MathUtils.lerp(physics.rpm, targetRPM, 0.1);
                
                // Set pitch and volume based on RPM
                engineOsc.frequency.setTargetAtTime(physics.rpm / 15, audioCtx.currentTime, 0.1);
                engineGain.gain.setTargetAtTime(0.05 + (physics.rpm/10000)*0.1, audioCtx.currentTime, 0.1);
            }

            // Apply Transformations to 3D Rig
            bikeRig.position.set(physics.x, physics.y + physics.suspensionOffset, physics.z);
            bikeRig.rotation.set(physics.pitch, physics.yaw, physics.roll);
            
            // Turn Handlebars visually
            handlebars.rotation.y = physics.steerAngle;
            frontWheel.rotation.x -= (physics.speed * dt); // Spin front wheel

            // Update UI HUD
            document.getElementById('speed-val').innerText = Math.abs(Math.round(physics.speed * 1.5));
            document.getElementById('gear-val').innerText = Math.max(1, Math.min(5, Math.ceil(physics.speed / 20)));
            document.getElementById('rpm-val').innerText = Math.round(physics.rpm);

            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.position.x += p.userData.vx; p.position.y += p.userData.vy; p.position.z += p.userData.vz;
                p.userData.vy -= 0.1; p.userData.life -= 0.05;
                p.scale.setScalar(p.userData.life);
                if(p.userData.life <= 0) { scene.remove(p); particles.splice(i,1); }
            }

            // Head Bob Camera Effect based on Engine RPM and Speed
            const vibration = Math.sin(clock.elapsedTime * 50) * (physics.rpm/10000) * 0.02;
            camera.position.y = 4.8 + vibration;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
